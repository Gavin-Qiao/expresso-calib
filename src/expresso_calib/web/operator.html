<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Expresso Calib Operator</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260517-filters" />
  </head>
  <body class="operator-body">
    <main class="calib-console">
      <section class="source-strip">
        <div class="brand compact">
          <h1>Expresso Calib</h1>
        </div>
        <form id="cameraForm" class="camera-form">
          <input id="cameraLabel" type="text" autocomplete="off" placeholder="Camera name" />
          <input id="cameraUrl" type="text" autocomplete="off" spellcheck="false" placeholder="Camera URL or device://0" />
          <button id="useSystemWebcam" type="button" title="Use built-in webcam (device://0)">Use webcam</button>
          <button id="addCamera" type="submit" class="primary">Add</button>
        </form>
        <div class="run-actions">
          <button id="showTargetQr" type="button">Target QR</button>
          <button id="exportAll" type="button" title="Save calibration.json / report.md / detections.csv for every camera">Export</button>
          <button id="toggleStreams" type="button" class="primary">Start All</button>
        </div>
      </section>

      <section id="cameraList" class="camera-list" aria-label="Camera sources"></section>
      <section id="cameraGrid" class="camera-grid" aria-label="Camera streams"></section>
    </main>

    <dialog id="targetQrDialog" class="qr-dialog" aria-labelledby="targetQrTitle">
      <div class="qr-dialog-head">
        <h2 id="targetQrTitle">Target QR</h2>
        <button id="closeTargetQr" type="button" aria-label="Close target QR">Close</button>
      </div>
      <img id="targetQrImage" class="qr-dialog-image" alt="QR code for iPad target" />
      <a id="targetQrUrl" class="qr-dialog-url" target="_blank" rel="noopener"></a>
    </dialog>

    <template id="cameraRowTemplate">
      <article class="camera-row">
        <div class="camera-row-head">
          <strong class="camera-row-label"></strong>
          <span class="camera-row-url"></span>
          <button type="button" class="camera-row-filters-toggle" aria-expanded="false">Filters</button>
          <button type="button" class="camera-row-remove">Remove</button>
        </div>
        <div class="camera-row-filters" hidden>
          <label class="filter-row">
            <span class="filter-name">Brightness</span>
            <input class="filter-input filter-brightness" type="range" min="-100" max="100" step="1" value="0" />
            <span class="filter-value filter-brightness-value">0</span>
          </label>
          <label class="filter-row">
            <span class="filter-name">Contrast</span>
            <input class="filter-input filter-contrast" type="range" min="50" max="200" step="1" value="100" />
            <span class="filter-value filter-contrast-value">100</span>
          </label>
          <label class="filter-row">
            <span class="filter-name">Gamma</span>
            <input class="filter-input filter-gamma" type="range" min="0.5" max="2.5" step="0.05" value="1.0" />
            <span class="filter-value filter-gamma-value">1.00</span>
          </label>
          <label class="filter-row filter-clahe-row">
            <input class="filter-input filter-clahe" type="checkbox" />
            <span>CLAHE (adaptive contrast)</span>
          </label>
          <div class="filter-actions">
            <button type="button" class="filter-reset">Reset</button>
          </div>
        </div>
      </article>
    </template>

    <template id="cameraTileTemplate">
      <article class="camera-tile">
        <img class="camera-feed" alt="" />
        <div class="camera-placeholder" aria-live="polite">
          <strong class="camera-placeholder-title">No live frames</strong>
          <span class="camera-placeholder-detail">Waiting for camera stream</span>
        </div>
        <div class="camera-chrome">
          <div class="camera-title"></div>
          <div class="accuracy-panel" aria-live="polite">
            <span class="accuracy-label">Accuracy</span>
            <strong class="accuracy-value">--</strong>
            <span class="accuracy-rms">No solve</span>
            <span class="accuracy-used">0 used</span>
            <span class="accuracy-meter"><span class="accuracy-meter-fill"></span></span>
          </div>
        </div>
        <div class="camera-footer">
          <div class="detection-badge"></div>
          <div class="camera-log"></div>
        </div>
      </article>
    </template>

    <script src="/static/operator.js?v=20260517-filters"></script>
  </body>
</html>
